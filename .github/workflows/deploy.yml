name: Deploy Jupyter Book to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:  # allow manual triggers from the Actions tab

permissions:
  contents: read
  pages: write
  id-token: write

# `BASE_URL` determines the site root; set per jupyter-book init recommendations
env:
  BASE_URL: /${{ github.event.repository.name }}
  # Opt into Node.js 24 for JavaScript actions to avoid Node 20 deprecation issues
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

# Only one deployment at a time; cancel any in-flight job
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  # ------------------------------------------------------------------ #
  # JOB 1: Build the site
  # ------------------------------------------------------------------ #
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up Node.js 22 LTS
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install Jupyter Book (via myst)
        run: npm install -g jupyter-book

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Build site content (downloads theme)
        run: jupyter-book build --site

      - name: Install theme dependencies and rebuild with PyodideCell component
        run: |
          cd templates/site/myst/book-theme
          npm install
          npx turbo run build
          cd themes/book
          cp remix.config.prod.js remix.config.js
          npx tailwindcss -c tailwind.config.js -i styles/app.css -o app/styles/app.css --minify
          npx remix build

      - name: Patch theme with custom build and static assets
        run: python patch_theme.py

      - name: Build static HTML site
        run: jupyter-book build --html

      - name: Build JupyterLite (standalone lab)
        run: |
          # Determine the HTML output directory
          if [ -d "_build/html" ]; then
            OUTDIR="_build/html/jupyterlite"
          elif [ -d "_build/site/public" ]; then
            OUTDIR="_build/site/public/jupyterlite"
          else
            OUTDIR="_build/html/jupyterlite"
            mkdir -p _build/html
          fi
          
          jupyter lite build --contents notebooks/ --output-dir "$OUTDIR"

      - name: Detect build output
        id: detect
        run: |
          if [ -d "_build/html" ]; then
            echo "path=_build/html" >> "$GITHUB_OUTPUT"
          elif [ -d "_build/site/public" ]; then
            echo "path=_build/site/public" >> "$GITHUB_OUTPUT"
          elif [ -d "_build/site" ]; then
            echo "path=_build/site" >> "$GITHUB_OUTPUT"
          else
            echo "No build output found. Listing _build:" >&2
            ls -la _build || true
            echo "path=" >> "$GITHUB_OUTPUT"
            exit 1
          fi

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: "${{ steps.detect.outputs.path }}"

  # ------------------------------------------------------------------ #
  # JOB 2: Deploy to GitHub Pages
  # ------------------------------------------------------------------ #
  deploy:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    steps:
      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4
