# See docs at: https://mystmd.org/guide/frontmatter
version: 1

project:
  id: 5eae42df-5f18-4619-b9d9-8a56f17a08be
  title: JupyterBook v2 + JupyterLite Template
  description: A template for publishing notebook-based docs using Jupyter Book v2 (MyST) with JupyterLite support
  keywords: [jupyter, jupyterbook, mystmd, jupyterlite, template, pyodide]
  authors:
    - name: Chandravesh Chaudhari
      github: chandraveshchaudhari
  github: https://github.com/chandraveshchaudhari/jupyterbook2_with_lite_template
  license:
    code: MIT
    content: CC-BY-4.0
  # plugins: (disabled) - enable only after installing required Node dependencies

  jupyter:
    lite: true
    # binder:                                    # configures the ⚡ power button's Binder backend
    #   repo: chandraveshchaudhari/jupyterbook2_with_lite_template
    #   ref: main
  # Update with your own GitHub username and repo name.
  binder: https://mybinder.org/v2/gh/chandraveshchaudhari/jupyterbook2_with_lite_template/HEAD

  # ---------------------------------------------------------------------------
  # Banner image — referenced from project root (myst.yml location)
  # ---------------------------------------------------------------------------
  banner: media/images/banner_image.png

  # ---------------------------------------------------------------------------
  # Table of Contents — controls site navigation
  # ---------------------------------------------------------------------------
  plugins:
    - plugins/pyodide-block.mjs
  
  
  toc:
    - file: intro.md
    - title: Getting Started
      children:
        - file: notebooks/adding_contents.ipynb

    - title: Features & Showcase
      children:
        - file: notebooks/features.ipynb
        - file: notebooks/section_markdown_page.md
        - file: notebooks/pyodide_example.md

site:
  template: book-theme
  options:
    logo: media/images/banner_image.png
    favicon: media/images/banner_image.png
    folders: true          # generates clean /page/ URLs
    # logo_dark: media/images/banner_image_dark.png
    style: media/custom.css   # custom fonts, layout, fullscreen, scrollable output
    # outline_maxdepth: 2          # right-side outline depth (keeps it concise)
    # hide_outline: true         # un-comment to fully hide the right outline
    # hide_authors: true
    # hide_title_block: true
